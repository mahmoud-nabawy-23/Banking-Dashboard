<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@100;200;300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <div class="home">
    <aside>
      <div class="head-logo">
        <div class="logo"><img src="./icons/coins-solid-full.png" alt="home logo"></div>
        <div class="text.logo">
          <h2>مدبّر</h2>
          <p>إدارة أموالك بذكاء</p>
        </div>
      </div>
      <div class="up">
        <ul>
          <li class="active"><a href="#"><img src="./icons/house-solid-full.png" alt="">
              <p>الصفحة الرئيسية</p>
            </a></li>
          <li><a href="#"><img src="./icons/arrow-right-arrow-left-solid-full.png" alt="">
              <p>المعاملات</p>
            </a></li>
          <li><a href="#"><img src="./icons/chart-pie-solid-full.png" alt="">
              <p>الميزانيات</p>
            </a></li>
          <li><a href="#"><img src="./icons/piggy-bank-solid.png" alt="">
              <p>المدخرات</p>
            </a></li>
          <li><a href="#"><img src="./icons/file-invoice-dollar-solid-full.png" alt="">
              <p> الفواتير الشهرية</p>
            </a></li>
        </ul>
      </div>
      <p>إجراءات سريعة</p>
      <div class="down">
        <ul>
          <li><a href="#"><img src="./icons/paper-plane-solid-full.png" alt="">
              <p>إرسال أموال</p>
            </a></li>
          <li><a href="#"><img src="./icons/plus-solid-full.png" alt="">
              <p>إضافة أموال</p>
            </a></li>
          <li><a href="#"><img src="./icons/receipt-solid-full.png" alt="">
              <p>دفع فاتورة</p>
            </a></li>
          <li><a href="#"><img src="./icons/chart-line-solid-full.png" alt="">
              <p>استثمار</p>
            </a></li>
        </ul>
      </div>
    </aside>
    <div class="container">
      <div class="header">
        <div class="right">
          <div class="head-logo">
            <div class="logo"><img src="./icons/coins-solid-full.png" alt="home logo"></div>
            <div class="text.logo">
              <h2>مدبّر</h2>
              <p>إدارة أموالك بذكاء</p>
            </div>
            <div class="status"> <span class="dot"></span>
              <p>متصل</p>
            </div>
          </div>
        </div>
        <div class="left">
          <div class="icons">
            <i class="fa-solid fa-magnifying-glass" style="color: #364153;"></i>
          <i class="fa-regular fa-bell" style="color: #364153;"></i>
          </div>
          <div class="profile">
            <img src="./personal-avatar.jpg" alt="profile picture">
            <div class="name">
              <p>محمود نبوي</p>
              <p>حساب مميز</p>
            </div>
          </div>
        </div>
        <div class="hidden-status">
          <p>متصل <span class="dot"></span></p>
        </div>
      </div>

    </div>
  </div>
</body>

</html>
